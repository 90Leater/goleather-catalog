<!DOCTYPE html>
<html lang="id">
<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width,initial-scale=1">

<title>GO.Leather Admin</title>

<link rel="stylesheet" href="css/admin.css">

</head>

<body>

<aside class="sidebar">

    <div class="logo">
        GO.Leather
    </div>

    <ul>

        <li class="active">
            Dashboard
        </li>

        <li>
            Produk
        </li>

        <li>
            Kategori
        </li>

        <li>
            Pengunjung
        </li>

        <li>
            Logout
        </li>

    </ul>

</aside>

<main>

<header>

<h2>
Dashboard
</h2>

</header>

<section class="cards">

<div class="card">

<h3>Total Produk</h3>

<span id="totalProducts">

0

</span>

</div>

<div class="card">

<h3>Total View</h3>

<span id="totalViews">

0

</span>

</div>

<div class="card">

<h3>Produk Terpopuler</h3>

<span id="topProduct">

-

</span>

</div>

</section>

<section class="toolbar">

<button id="addProduct">

+ Tambah Produk

</button>

<button id="importJson">
Import product.json
</button>

<div id="importStatus"></div>

<input
type="text"
id="searchProduct"
placeholder="Cari produk...">

</section>

    <table>

    <thead>

    <tr>

    <th>ID</th>

    <th>Nama</th>

    <th>Kategori</th>

    <th>Status</th>

    <th>Aksi</th>

    </tr>

    </thead>

    <tbody id="productTable">

    <tr>

    <td colspan="5">
        Memuat produk...
    </td>

    </tr>

    </tbody>

    </table>

</main>

<script type="module" src="js/admin.js"></script>

</body>
</html>
