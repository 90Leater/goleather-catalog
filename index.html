<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GO.Leather Catalog</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="hero">
    <div class="hero-content">
        <h1>GO.Leather</h1>

        <h2>Koleksi Sandal Terbaru</h2>

        <p>
            Ratusan Model • Banyak Pilihan Warna
        </p>

        <a href="#products" class="hero-btn">
            Lihat Produk
        </a>
    </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="Cari produk atau kode...">
  <select id="warnaFilter">
    <option value="">Semua Warna</option>
  </select>
</div>

<div id="products" class="products"></div>

<div id="productModal" class="modal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <img id="modalImage" src="" alt="">

        <h2 id="modalName"></h2>

        <p id="modalCode"></p>

        <p id="modalCategory"></p>

        <div id="galleryThumbs"></div>

        <a id="modalWhatsapp"
           class="btn"
           target="_blank">
           Tanya Harga
        </a>

    </div>

</div>

<script src="js/app.js"></script>
</body>
</html>
