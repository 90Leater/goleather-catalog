<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GO.Leather Catalog</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<header class="hero">
    <div class="hero-content">
        <h1>GO.Leather</h1>

        <h2>Koleksi Sandal Terbaru</h2>

        <p>
            Ratusan Model • Banyak Pilihan Warna
        </p>

        <a href="#products" class="hero-btn">
            Lihat Produk
        </a>
    </div>
</header>

<div class="toolbar">
  <input type="text" id="search" placeholder="Cari produk atau kode...">
  <select id="kategoriFilter">
    <option value="">Semua Kategori</option>
</select>
</div>
<div class="product-tabs">

    <button
    id="showAll"
    class="tab-btn active">
    Semua Produk
    </button>

    <button
    id="showFavorites"
    class="tab-btn">
    ❤️ Favorit (<span id="favoriteCount">0</span>)
    </button>

</div>
<div id="productCount" class="product-count"></div>

<div id="products" class="products"></div>
<div id="pagination" class="pagination"></div>

<div id="productModal" class="modal">

    <div class="modal-content">

        <span class="close">&times;</span>

        <img id="modalImage" src="" alt="">

        <h2 id="modalName"></h2>

        <p id="modalCode"></p>

        <p id="modalCategory"></p>
        <div class="modal-nav">
            <button id="prevProduct">◀ Sebelumnya</button>
            <button id="nextProduct">Berikutnya ▶</button>
        </div>

        <div id="galleryThumbs"></div>

        <h3>Produk Serupa</h3>

        <div id="relatedProducts"
         class="related-products">
        </div>

        <a id="modalWhatsapp"
           class="btn"
           target="_blank">
           Tanya Harga
        </a>

    </div>

</div>
<a
href="https://wa.me/6288973623416?text=Halo%20GO.Leather,%20saya%20ingin%20bertanya%20tentang%20produk."
class="floating-wa"
target="_blank">

💬 WhatsApp

</a>
<button id="backToTop">
    ⬆
</button>
<footer class="footer">

    <h3>GO.Leather</h3>

    <p>
        Katalog Sandal Wanita
    </p>

    <div class="footer-links">

        <a
        href="https://wa.me/6288973623416"
        target="_blank">
        WhatsApp
        </a>

    </div>

    <p class="copyright">
        © 2026 GO.Leather
    </p>

</footer>
<script src="js/app.js"></script>
</body>
</html>
